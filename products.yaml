# Product registry for auth-bff
# Loaded from PRODUCTS_CONFIG_PATH env var.
# Secrets are referenced by env var name (clientSecretEnv) — never inline.
#
# Auth isolation — per-product GIP tenants:
#   Each product gets its own GIP tenant(s) for user pool isolation.
#   This prevents email collisions across products and limits blast radius.
#   GIP tenants are free (cost is per-MAU, not per-tenant).
#
#   Tenant naming:
#     platform     → Tesserix Home super-admins
#     mp-internal  → Marketplace staff/admins
#     mp-customer  → Marketplace storefront end-users
#     fz-internal  → Fanzone staff (future)
#     fz-customer  → Fanzone attendees (future)
#
#   Roles within each tenant are managed by OpenFGA, not GIP.

platformDomain: tesserix.app

products:
  - name: tesserix
    domain: tesserix.app
    apps:
      - name: home
        hosts:
          - "tesserix.app"
          - "www.tesserix.app"
          - "dev.tesserix.app"
          - "localhost:3002"
          - "auth-bff-e737nq7avq-el.a.run.app"
          - "tesserix-home-e737nq7avq-el.a.run.app"
        gipTenantId: Platform-2c9z0
        oauthClientId: "849928263410-jqui1pe6ihap405o5uee5f5srh18luku.apps.googleusercontent.com"
        clientSecretEnv: PLATFORM_CLIENT_SECRET
        sessionCookie: bff_home_session
        callbackPath: /auth/callback
        postLoginUrl: /admin/dashboard
        postLogoutUrl: /login
        authContext: staff
        allowedEmailsEnv: PLATFORM_ALLOWED_EMAILS  # Comma-separated list in GCP Secret Manager
        allowedOrigins:
          - "https://tesserix.app"
          - "https://www.tesserix.app"
          - "https://dev.tesserix.app"
          - "http://localhost:3002"
          - "https://auth-bff-e737nq7avq-el.a.run.app"
          - "https://tesserix-home-e737nq7avq-el.a.run.app"

  - name: marketplace
    domain: mark8ly.com
    apps:
      - name: admin
        hosts:
          - "*-admin.mark8ly.com"
          - "admin.localhost"
          - "localhost:3000"
        gipTenantId: MP-Internal-e986p
        oauthClientId: 849928263410-5djgu3n40c5tpr86votuptkitqveegor.apps.googleusercontent.com
        clientSecretEnv: MP_ADMIN_CLIENT_SECRET
        sessionCookie: bff_mk_admin_session
        callbackPath: /auth/callback
        callbackHost: mark8ly.com  # Single callback host — avoids per-tenant OAuth redirect URI registration
        postLoginUrl: /
        postLogoutUrl: /login
        authContext: staff
        allowedOrigins:
          - "https://*-admin.mark8ly.com"
          - "http://localhost:3000"

      - name: storefront
        hosts:
          - "*.mark8ly.com"
          - "*-store.mark8ly.com"
        gipTenantId: MP-Customer-zoe11
        oauthClientId: 849928263410-fpkq6335ftah184skcnev4lrh0v930g7.apps.googleusercontent.com
        clientSecretEnv: MP_STOREFRONT_CLIENT_SECRET
        sessionCookie: bff_mk_store_session
        callbackPath: /auth/callback
        postLoginUrl: /
        postLogoutUrl: /
        authContext: customer
        allowedOrigins:
          - "https://*.mark8ly.com"

      - name: onboarding
        hosts:
          - "mark8ly.com"
          - "www.mark8ly.com"
          - "onboarding.mark8ly.com"
          - "localhost:3001"
        gipTenantId: MP-Internal-e986p
        oauthClientId: 849928263410-5djgu3n40c5tpr86votuptkitqveegor.apps.googleusercontent.com
        clientSecretEnv: MP_ADMIN_CLIENT_SECRET
        sessionCookie: bff_mk_admin_session
        callbackPath: /auth/callback
        postLoginUrl: /
        postLogoutUrl: /login
        authContext: staff
        allowedOrigins:
          - "https://mark8ly.com"
          - "https://www.mark8ly.com"
          - "https://onboarding.mark8ly.com"
          - "http://localhost:3001"
