# Product registry for auth-bff
# Mounted as ConfigMap in K8s, loaded from PRODUCTS_CONFIG_PATH env var.
# Secrets are referenced by env var name (clientSecretEnv) — never inline.

platformDomain: tesserix.app

products:
  - name: tesserix
    domain: tesserix.app
    apps:
      - name: home
        hosts:
          - "tesserix.app"
          - "www.tesserix.app"
          - "dev.tesserix.app"
          - "localhost:3002"
        realm: internal
        clientId: platform
        clientSecretEnv: PLATFORM_CLIENT_SECRET
        sessionCookie: bff_home_session
        callbackPath: /auth/callback
        postLoginUrl: /admin/dashboard
        postLogoutUrl: /login
        authContext: staff
        allowedOrigins:
          - "https://tesserix.app"
          - "https://www.tesserix.app"
          - "https://dev.tesserix.app"
          - "http://localhost:3002"

