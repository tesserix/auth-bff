# Product registry for auth-bff
# Loaded from PRODUCTS_CONFIG_PATH env var.
# Secrets are referenced by env var name (clientSecretEnv) — never inline.
#
# Auth isolation:
#   - gipTenantId: Google Identity Platform tenant (like Keycloak realms)
#     - "staff" tenant: platform admins, marketplace staff
#     - "customer" tenant: storefront end-users
#   - Roles within each tenant are managed by OpenFGA

platformDomain: tesserix.app

products:
  - name: tesserix
    domain: tesserix.app
    apps:
      - name: home
        hosts:
          - "tesserix.app"
          - "www.tesserix.app"
          - "dev.tesserix.app"
          - "localhost:3002"
          - "auth-bff-e737nq7avq-el.a.run.app"
          - "tesserix-home-e737nq7avq-el.a.run.app"
        gipTenantId: ""
        oauthClientId: "677812215720-3q9j7rjt8op266ih0l9qlc5bg0jckeer.apps.googleusercontent.com"
        clientSecretEnv: PLATFORM_CLIENT_SECRET
        sessionCookie: bff_home_session
        callbackPath: /auth/callback
        postLoginUrl: /admin/dashboard
        postLogoutUrl: /login
        authContext: staff
        allowedEmails:
          - "mahesh.sangawar@gmail.com"
          - "admtesserix@gmail.com"
          - "samyak.rout@gmail.com"
        allowedOrigins:
          - "https://tesserix.app"
          - "https://www.tesserix.app"
          - "https://dev.tesserix.app"
          - "http://localhost:3002"
          - "https://auth-bff-e737nq7avq-el.a.run.app"
          - "https://tesserix-home-e737nq7avq-el.a.run.app"

