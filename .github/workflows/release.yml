name: Auth BFF - Release Build

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  security-events: write
  attestations: write
  id-token: write

env:
  GO_VERSION: "1.25"
  GOPRIVATE: github.com/tesserix/*
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  GCP_PROJECT_ID: tesseracthub-480811
  GAR_REGISTRY: asia-south1-docker.pkg.dev
  GAR_REPOSITORY: cloud-run-source-deploy
  CLOUD_RUN_SERVICE: auth-bff

jobs:
  # =============================================================================
  # Quality Checks - Vet and Tests (runs first)
  # =============================================================================
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Configure private modules
        run: git config --global url."https://${TOKEN}@github.com/".insteadOf "https://github.com/"
        env:
          TOKEN: ${{ secrets.GO_PRIVATE_TOKEN }}

      - name: Test
        id: test
        run: go test -v -race ./...

      - name: Quality Summary
        if: always()
        run: |
          echo "## Quality Check Summary - Auth BFF" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| go test | ${{ steps.test.outcome == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY

  # =============================================================================
  # Release Build (runs after quality checks)
  # =============================================================================
  release:
    name: Release Auth BFF
    runs-on: ubuntu-latest
    needs: [quality]
    outputs:
      version: ${{ steps.version.outputs.version }}
      digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          # Remove 'v' prefix if present
          VERSION="${TAG#v}"

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release version: $VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ env.GCP_PROJECT_ID }}
          token_format: access_token

      - name: Log in to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.gcp-auth.outputs.access_token }}

      - name: Compute GAR image tag
        id: gar-tag
        run: |
          GAR_IMAGE="${{ env.GAR_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.CLOUD_RUN_SERVICE }}"
          echo "gar_image=$GAR_IMAGE" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            ${{ env.GAR_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.CLOUD_RUN_SERVICE }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.version.outputs.version }}
            type=semver,pattern={{major}},value=${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=Auth BFF
            org.opencontainers.image.description=Auth BFF - authentication gateway for Tesserix
            org.opencontainers.image.vendor=Tesserix
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GITHUB_TOKEN=${{ secrets.GO_PRIVATE_TOKEN }}
          cache-from: type=gha,scope=release
          cache-to: type=gha,mode=max,scope=release
          platforms: linux/amd64

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
        continue-on-error: true

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Attest image provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
        continue-on-error: true

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const version = '${{ steps.version.outputs.version }}';
            const tag = '${{ steps.version.outputs.tag }}';

            const releaseNotes = `## Auth BFF - Release v${version}

            ### Docker Images

            The following Docker images have been published:

            \`\`\`
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${version}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            \`\`\`

            ### Image Details

            - **Registry:** \`${{ env.REGISTRY }}\`
            - **Image:** \`${{ env.IMAGE_NAME }}\`
            - **Version:** \`${version}\`
            - **Platform:** linux/amd64
            - **Digest:** \`${{ steps.build.outputs.digest }}\`

            ### Tags

            ${{ steps.meta.outputs.tags }}

            ### Build Information

            - **Commit SHA:** ${{ github.sha }}
            - **Build Date:** ${new Date().toISOString()}

            ### Security

            - Vulnerability scanning completed with Trivy
            - Build provenance attestation created
            - Quality checks (vet, test) passed
            `;

            try {
              await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: tag,
                name: `Auth BFF v${version}`,
                body: releaseNotes,
                draft: false,
                prerelease: version.includes('-'),
                generate_release_notes: false
              });
              console.log(`Created release for ${tag}`);
            } catch (error) {
              if (error.status === 422) {
                console.log('Release already exists, skipping creation');
              } else {
                throw error;
              }
            }

      - name: Release Summary
        if: always()
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Application:** Auth BFF" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.version.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Published Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY

  # =============================================================================
  # Deploy to Cloud Run (production)
  # =============================================================================
  deploy-cloudrun:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: [release]

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image "${{ env.GAR_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.CLOUD_RUN_SERVICE }}:${{ needs.release.outputs.version }}" \
            --region asia-south1 \
            --project ${{ env.GCP_PROJECT_ID }} \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=1 \
            --max-instances=20 \
            --no-allow-unauthenticated \
            --ingress=internal-and-cloud-load-balancing \
            --vpc-connector=projects/${{ env.GCP_PROJECT_ID }}/locations/asia-south1/connectors/gl-prod-vpc-connector \
            --vpc-egress=private-ranges-only \
            --set-env-vars="\
          APP_ENV=production,\
          KEYCLOAK_URL=https://auth.tesserix.app,\
          KEYCLOAK_INTERNAL_URL=https://internal-idp.mark8ly.com,\
          INTERNAL_REALM=internal,\
          CUSTOMER_REALM=customers,\
          INTERNAL_CLIENT_ID=admin-bff,\
          CUSTOMER_CLIENT_ID=storefront-bff,\
          BASE_DOMAIN=mark8ly.com,\
          HOME_DOMAIN=tesserix.app,\
          WEBAUTHN_RP_ID=tesserix.app,\
          WEBAUTHN_RP_NAME=Tesserix,\
          REDIS_URL=redis://10.10.15.220:6379,\
          RATE_LIMIT_RPM=300,\
          API_GATEWAY_URL=http://34.93.146.250:80" \
            --set-secrets="\
          INTERNAL_CLIENT_SECRET=prod-keycloak-admin-bff-client-secret:latest,\
          CUSTOMER_CLIENT_SECRET=prod-keycloak-customer-dashboard-client-secret:latest,\
          SESSION_SECRET=prod-encryption-key:latest,\
          CSRF_SECRET=prod-jwt-secret:latest,\
          ENCRYPTION_KEY=prod-encryption-key:latest,\
          BACKUP_CODE_HMAC_KEY=prod-auth-bff-backup-code-hmac-key:latest,\
          TOTP_KEY_DERIVATION_SECRET=prod-totp-encryption-key:latest,\
          REDIS_PASSWORD=prod-marketplace-redis-password:latest,\
          INTERNAL_SERVICE_KEY=prod-internal-service-key:latest" \
            --quiet

      - name: Deploy Summary
        run: |
          echo "## Cloud Run Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service:** ${{ env.CLOUD_RUN_SERVICE }}" >> $GITHUB_STEP_SUMMARY
          echo "**Region:** asia-south1" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ${{ env.GAR_REGISTRY }}/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.CLOUD_RUN_SERVICE }}:${{ needs.release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployed to Cloud Run!" >> $GITHUB_STEP_SUMMARY
