name: Release

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write
  security-events: write
  attestations: write
  id-token: write

jobs:
  release:
    uses: tesserix/tesserix-infra/.github/workflows/_release-go.yml@main
    with:
      service_name: auth-bff
      service_title: Auth BFF
    secrets:
      GO_PRIVATE_TOKEN: ${{ secrets.GO_PRIVATE_TOKEN }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}

  deploy:
    needs: [release]
    uses: tesserix/tesserix-infra/.github/workflows/_deploy-cloudrun.yml@main
    with:
      service_name: auth-bff
      image: ${{ needs.release.outputs.image }}
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
