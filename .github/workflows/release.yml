name: Release

on:
  push:
    tags: ["v*"]

env:
  GO_VERSION: "1.25"
  GCP_PROJECT_ID: tesseracthub-480811
  GCP_REGION: us-central1
  SERVICE_NAME: auth-bff
  REGISTRY: us-central1-docker.pkg.dev/tesseracthub-480811/tesserix

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Test
        run: go test -v -race ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev

      - name: Build and push Docker image
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          IMAGE=${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:${TAG}
          docker build -t $IMAGE .
          docker tag $IMAGE ${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:latest
          docker push $IMAGE
          docker push ${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:latest

      - name: Deploy to Cloud Run (prod)
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image=${{ env.REGISTRY }}/${{ env.SERVICE_NAME }}:${TAG} \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=1 \
            --max-instances=20 \
            --set-env-vars="APP_ENV=production"
